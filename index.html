<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  overflow:hidden;
  color:white;
  transition:0.6s;
}

/* ===== THEMES ===== */
.defaultTheme{background:black;}

.birthdayTheme{
  background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
  background-size:400% 400%;
  animation:bg 10s infinite;
}

.loadingTheme{
  background: radial-gradient(circle,#1a1a2e,#000);
}

.proposalTheme{
  background: radial-gradient(circle,#000,#2b0a3d);
}

@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== SCREENS ===== */
.screen{
  display:none;
  height:100vh;
  width:100vw;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.show{display:flex;}

/* ===== INPUT ===== */
input{
  padding:15px;
  width:70%;
  border-radius:20px;
  border:2px solid #ff4d6d;
  background:black;
  color:white;
}

/* ===== BUTTON ===== */
button{
  padding:14px 25px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin-top:10px;
}

/* ===== PHOTO ===== */
#photo{
  width:70vw;
  height:70vw;
  border-radius:20px;
  object-fit:cover;
}

/* ===== TEXT ===== */
#wish{
  font-size:4vw;
  line-height:1.6;
}

/* ===== COUNT ===== */
#count{font-size:20vw;}

/* ===== ROAM BUTTON ===== */
#yesBtn{position:relative;}
@keyframes roam{
  0%{transform:translate(0);}
  25%{transform:translate(60px,-40px);}
  50%{transform:translate(-60px,40px);}
  75%{transform:translate(60px,60px);}
  100%{transform:translate(0);}
}
.roaming{animation:roam 0.3s infinite;}

/* ===== HEARTS ===== */
.heart{
  position:absolute;
  animation:float 6s linear forwards;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* ===== LOADING ===== */
#loadingBox{
  width:75%;
  height:12px;
  background:rgba(255,255,255,0.2);
  border-radius:20px;
  overflow:hidden;
  margin-top:15px;
}

#loadingBar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff4d6d,#6cf,#ffd86f);
}

#percent{font-size:6vw;margin-top:10px;}
#funText{font-size:4vw;margin-top:10px;}

/* ===== PROPOSAL ===== */
#proposalImg{
  width:90%;
  opacity:0;
  transform:translateY(150px) scale(0.6);
  transition:all 2s ease;
}

#proposalText{
  margin-top:20px;
  font-size:4.5vw;
  line-height:1.6;
  padding:10px;
  opacity:0;
}

</style>
</head>

<body class="defaultTheme">

<!-- LOGIN -->
<div id="login" class="screen show">
  <h2>🔐 Enter Password</h2>
  <input id="passInput" placeholder="Enter password">
  <p id="error" style="color:red;"></p>
  <button onclick="unlock()">Unlock</button>
</div>

<!-- MAIN -->
<div id="main" class="screen">
  <img id="photo" src="photo1.jpg">
  <p id="wish"></p>
  <button onclick="start()">Tap 💖</button>
</div>

<!-- COUNT -->
<div id="countScreen" class="screen">
  <h1 id="count">5</h1>
</div>

<!-- READY -->
<div id="readyScreen" class="screen">
  <h2>Are you ready?</h2>
  <button id="yesBtn" onclick="goNext()">Yes 💕</button>
</div>

<!-- LOADING -->
<div id="waitScreen" class="screen">
  <h2>💌 Preparing something special...</h2>
  <p id="funText">Loading...</p>

  <div id="loadingBox">
    <div id="loadingBar"></div>
  </div>

  <p id="percent">0%</p>
</div>

<!-- PROPOSAL -->
<div id="proposal" class="screen">
  <img id="proposalImg" src="proposal-card.jpg">
  <p id="proposalText"></p>
</div>

<audio id="boom" src="boom.mp3"></audio>
<audio id="music" src="makhamali.mp3"></audio>

<script>

const boom=document.getElementById("boom");
const music=document.getElementById("music");

/* ===== THEME ===== */
function setTheme(t){
  document.body.className=t;
}

/* ===== SCREEN ===== */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

/* ===== PASSWORD ===== */
function unlock(){
  let val=passInput.value.trim().toLowerCase();

  if(val==="angry bird"){
    boom.play().catch(()=>{});
    setTheme("birthdayTheme");
    show("main");
    typeText();
    hearts();
    startSlider();
  }else{
    error.innerText="Wrong password 💔";
  }
}

/* ===== BIRTHDAY TEXT ===== */
let text=`Wishing you a very happy and joyful birthday 🎂💗
May your life always be filled with happiness, love, and success.
May all your dreams and wishes come true.
It’s not just your birthday… it’s the day someone special like you came into this world and made my life better in many ways.
You’ve become someone really special to me. Stay the same, my favourite Angry Bird 🐦❤️
Once again, happy birthday to my special person 💗✨`;

let i=0;
function typeText(){
  let box=document.getElementById("wish");
  box.innerHTML="";
  let t=setInterval(()=>{
    box.innerHTML+=text.charAt(i++);
    if(i>=text.length) clearInterval(t);
  },60);
}

/* ===== SLIDER (FIXED) ===== */
let photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg"];

function startSlider(){
  let img=document.getElementById("photo");
  if(!img) return;

  setInterval(()=>{
    img.src=photos[Math.floor(Math.random()*photos.length)];
  },2500);
}

/* ===== HEARTS ===== */
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💗";
    h.style.left=Math.random()*100+"%";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },300);
}

/* ===== START ===== */
function start(){
  boom.pause();
  setTheme("defaultTheme");
  show("countScreen");

  let c=5;
  let t=setInterval(()=>{
    c--;
    count.innerText=c;

    if(c==0){
      clearInterval(t);
      music.play().catch(()=>{});
      setTheme("defaultTheme");
      show("readyScreen");
      roam();
    }
  },1000);
}

/* ===== ROAM ===== */
function roam(){
  yesBtn.classList.add("roaming");
  setTimeout(()=>yesBtn.classList.remove("roaming"),5000);
}

/* ===== 29s LOADING ===== */
function goNext(){

  show("waitScreen");
  setTheme("loadingTheme");

  const funny=[
    "Loading emotions 💖...",
    "Preparing surprise 😏...",
    "Almost ready 👀...",
    "Heart syncing 💓...",
    "Magic building ✨...",
    "Don't blink 😳...",
    "Final touches 🎬..."
  ];

  let progress=0;
  let i=0;

  const total=29000;
  const step=100;
  const inc=100/(total/step);

  let textInt=setInterval(()=>{
    funText.innerText=funny[i%funny.length];
    i++;
  },1200);

  let load=setInterval(()=>{

    progress+=inc;

    if(progress>=100){
      progress=100;

      clearInterval(load);
      clearInterval(textInt);

      percent.innerText="100%";
      loadingBar.style.width="100%";

      setTimeout(()=>{
        showProposal();
      },800);

    }else{
      percent.innerText=Math.floor(progress)+"%";
      loadingBar.style.width=progress+"%";
    }

  },step);
}

/* ===== PROPOSAL ===== */
function showProposal(){

  show("proposal");
  setTheme("proposalTheme");

  let img=proposalImg;
  let box=document.getElementById("proposalText");

  let roam=0;

  let r=setInterval(()=>{

    img.style.opacity="0.5";
    img.style.transform=
      `translate(${Math.random()*60-30}px,${Math.random()*60-30}px) scale(0.6)`;

    if(++roam>8){
      clearInterval(r);

      setTimeout(()=>{
        img.style.opacity="1";
        img.style.transform="translate(0,0) scale(1)";
        typeProposalText();
      },500);
    }

  },200);
}

/* ===== PROPOSAL TEXT ===== */
let proposalMessage = `
I don’t know how to say this perfectly…
but I’ve been holding it in my heart for a long time 💖

From the moment you came into my life,
everything started feeling better, brighter, and more meaningful.

You became my comfort,
my happiness,
and my favourite person to think about 🌙

So today… I just want to ask you one thing honestly…

Will you be mine? ❤️
`;

function typeProposalText(){

  let box=document.getElementById("proposalText");
  box.innerHTML="";
  box.style.opacity="1";

  let i=0;

  let t=setInterval(()=>{

    box.innerHTML+=proposalMessage.charAt(i);
    i++;

    if(i>=proposalMessage.length){
      clearInterval(t);
    }

  },40);
}

</script>
</body>
</html>
